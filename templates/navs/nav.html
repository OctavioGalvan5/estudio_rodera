<nav style="
    background: linear-gradient(90deg, #1a5199 0%, #2176c7 100%);
    padding: 0 36px;
    display: flex; align-items: center; justify-content: space-between;
    height: 58px;
    box-shadow: 0 2px 10px rgba(26,81,153,0.28);
    position: sticky; top: 0; z-index: 100;
    border-bottom: 2px solid rgba(255,255,255,0.12);
">
    <a href="{{ url_for('home') }}" style="display:flex;align-items:center;gap:11px;text-decoration:none;">
        <i class="fas fa-balance-scale" style="color:rgba(255,255,255,0.8);font-size:1.15rem;"></i>
        <div>
            <span style="font-family:'Playfair Display',serif;font-size:1.05rem;font-weight:700;color:white;letter-spacing:.03em;display:block;line-height:1.1;">Estudio Rodera</span>
            <span style="font-size:.58rem;color:rgba(255,255,255,0.45);text-transform:uppercase;letter-spacing:.14em;font-family:'Lato',sans-serif;">Gestión Previsional</span>
        </div>
    </a>

    <div style="display:flex;align-items:center;gap:2px;">
        {% set nav_links = [
            ('home',             'fa-home',       'Inicio'),
            ('consultas',        'fa-users',      'Clientes'),
            ('planilla_demanda', 'fa-file-alt',   'Planilla Demanda'),
        ] %}
        {% for endpoint, icon, label in nav_links %}
        <a href="{{ url_for(endpoint) }}" style="
            color:rgba(255,255,255,0.85); text-decoration:none;
            font-size:.82rem; font-family:'Lato',sans-serif; font-weight:400;
            display:flex; align-items:center; gap:6px;
            padding:7px 13px; border-radius:5px; transition:background .15s;
        " onmouseover="this.style.background='rgba(255,255,255,0.12)'" onmouseout="this.style.background='transparent'">
            <i class="fas {{ icon }}" style="font-size:.74rem;opacity:.8;"></i> {{ label }}
        </a>
        {% endfor %}

        <div style="width:1px;height:18px;background:rgba(255,255,255,0.18);margin:0 4px;"></div>
        <span style="color:rgba(255,255,255,0.42);font-size:.74rem;font-family:'Lato',sans-serif;margin-right:2px;">{{ current_user.fullname }}</span>
        <a href="{{ url_for('logout') }}" style="
            color:rgba(255,255,255,0.82); text-decoration:none;
            font-size:.79rem; font-family:'Lato',sans-serif;
            display:flex; align-items:center; gap:6px;
            padding:7px 13px;
            border:1px solid rgba(255,255,255,0.22); border-radius:5px;
            transition:background .15s;
        " onmouseover="this.style.background='rgba(255,255,255,0.12)'" onmouseout="this.style.background='transparent'">
            <i class="fas fa-sign-out-alt" style="font-size:.74rem;"></i> Salir
        </a>
    </div>
</nav>
